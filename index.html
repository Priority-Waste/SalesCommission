<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priority Waste · Commission Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root {
  --yellow: #FFC20E;
  --yellow-hover: #E5A800;
  --yellow-soft: #FFF4CC;
  --black: #000000;
  --dark-gray: #333333;
  --mid-gray: #666666;
  --light-gray: #F4F4F4;
  --line: #E0E0E0;
  --white: #FFFFFF;
  --chart-green: #2F7D3A;
  --chart-red: #D93025;
  --chart-yellow: #FFC20E;
  --chart-black: #000000;
  --chart-gray: #999999;
  --bg: var(--white);
  --ink: var(--black);
  --muted: var(--mid-gray);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'Roboto', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-weight: 400;
}
.display { font-family: 'Oswald', Impact, sans-serif; font-weight: 600; letter-spacing: 0.01em; }
.mono { font-family: 'Roboto Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
.tabular { font-variant-numeric: tabular-nums; }

body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0;
  height: 4px; background: var(--yellow); z-index: 99;
}

.container { max-width: 1100px; margin: 0 auto; padding: 40px 32px 32px 32px; }

.eyebrow {
  font-family: 'Oswald', sans-serif;
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--muted); font-weight: 500;
}

.chip {
  background: var(--black); color: var(--white);
  font-family: 'Oswald', sans-serif;
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  font-weight: 500; padding: 4px 9px; display: inline-block;
}
.chip-warn { background: var(--yellow); color: var(--black); }
.chip-red { background: var(--chart-red); color: var(--white); }

.btn {
  font-family: 'Oswald', sans-serif;
  font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 12px 24px; border: 2px solid var(--black); cursor: pointer;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px;
  background: var(--black); color: var(--white);
}
.btn:hover { background: var(--yellow); color: var(--black); border-color: var(--black); }
.btn-ghost { background: var(--white); color: var(--black); }
.btn-ghost:hover { background: var(--black); color: var(--white); }

.brand-bar {
  background: var(--black); color: var(--white);
  padding: 14px 32px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand-logo {
  font-family: 'Oswald', sans-serif;
  font-weight: 700; font-size: 18px; letter-spacing: 0.12em; text-transform: uppercase;
  display: flex; align-items: center; gap: 10px;
}
.brand-logo-mark {
  background: var(--yellow); color: var(--black);
  padding: 3px 8px 2px 8px;
  font-weight: 700; font-size: 14px; letter-spacing: 0.1em;
}
.brand-subtag {
  font-family: 'Roboto', sans-serif;
  font-size: 11px; color: #999; letter-spacing: 0.06em; text-transform: uppercase;
}

.upload-screen { min-height: calc(100vh - 4px); display: flex; align-items: center; justify-content: center; padding: 24px; }
.upload-inner { max-width: 640px; width: 100%; }
.upload-headline {
  font-family: 'Oswald', sans-serif;
  font-size: 84px; line-height: 0.92; font-weight: 700; letter-spacing: -0.01em;
  text-transform: uppercase; margin-bottom: 20px; color: var(--black); margin-top: 20px;
}
.upload-headline .yellow-mark { background: var(--yellow); padding: 0 10px 4px 10px; display: inline-block; }
.upload-sub { color: var(--dark-gray); font-size: 16px; max-width: 520px; line-height: 1.55; }

.drop-zone {
  background: var(--light-gray); border: 2px solid var(--black);
  padding: 36px; margin-bottom: 16px; margin-top: 40px; transition: all 0.15s;
}
.drop-zone.dragover { background: var(--yellow-soft); border-color: var(--yellow); }
.drop-zone-row { display: flex; gap: 24px; align-items: flex-start; }
.drop-zone-icon {
  width: 56px; height: 56px; background: var(--yellow); color: var(--black);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; border: 2px solid var(--black);
}
.drop-zone-title {
  font-family: 'Oswald', sans-serif;
  font-size: 24px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.02em; margin-bottom: 4px;
}
.drop-zone-sub { color: var(--dark-gray); font-size: 14px; margin-bottom: 20px; line-height: 1.5; }

.error-banner {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; background: var(--chart-red); color: var(--white);
  font-size: 13px; font-weight: 500; margin-bottom: 16px;
}

.info-banner {
  display: flex; gap: 12px; padding: 16px 20px;
  background: var(--yellow-soft); color: var(--black);
  border-left: 6px solid var(--yellow);
  margin-bottom: 32px; font-size: 13px; line-height: 1.55;
}
.info-banner strong {
  font-family: 'Oswald', sans-serif;
  font-weight: 600; display: block; margin-bottom: 4px;
  font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em;
}
.info-banner-details { color: var(--dark-gray); font-size: 12px; }

.header-row {
  display: flex; align-items: flex-end; justify-content: space-between;
  padding-bottom: 24px; border-bottom: 3px solid var(--black);
  margin-bottom: 32px; gap: 24px;
}
.page-headline {
  font-family: 'Oswald', sans-serif;
  font-size: 52px; line-height: 0.95; font-weight: 700; letter-spacing: -0.01em;
  text-transform: uppercase; color: var(--black);
}
.page-headline .yellow-mark { background: var(--yellow); padding: 0 8px 2px 8px; }
.header-meta { margin-top: 14px; font-size: 13px; color: var(--dark-gray); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.format-tag {
  background: var(--black); color: var(--yellow);
  font-family: 'Oswald', sans-serif;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  font-weight: 500; padding: 3px 9px;
}

.kpi-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  margin-bottom: 48px; border: 2px solid var(--black);
}
.kpi { padding: 24px 22px; background: var(--white); }
.kpi:not(:first-child) { border-left: 1px solid var(--line); }
.kpi.highlight { background: var(--yellow); }
.kpi-label {
  font-family: 'Oswald', sans-serif;
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--mid-gray); font-weight: 500; margin-bottom: 14px;
}
.kpi.highlight .kpi-label { color: var(--black); }
.kpi-value {
  font-family: 'Oswald', sans-serif;
  font-size: 40px; line-height: 1; font-weight: 700; letter-spacing: -0.01em;
  color: var(--black);
}
.kpi-sub { font-size: 11px; color: var(--mid-gray); font-family: 'Roboto Mono', monospace; margin-top: 10px; letter-spacing: 0.02em; }
.kpi.highlight .kpi-sub { color: var(--dark-gray); }

.section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid var(--black);
}
.section-title {
  font-family: 'Oswald', sans-serif;
  font-size: 24px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.02em; color: var(--black);
}

.leaderboard { background: var(--white); border: 2px solid var(--black); margin-bottom: 48px; }
.lb-head, .lb-row { display: grid; grid-template-columns: 50px 2.5fr 1.5fr 1.5fr 1.5fr 1.5fr; align-items: center; padding: 14px 20px; }
.lb-head {
  background: var(--black); color: var(--white);
  font-family: 'Oswald', sans-serif;
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
}
.lb-row { border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.1s; padding: 16px 20px; background: var(--white); }
.lb-row:hover { background: var(--yellow-soft); }
.lb-row:last-child { border-bottom: none; }
.lb-rank { color: var(--mid-gray); font-family: 'Roboto Mono', monospace; font-size: 13px; font-weight: 500; }
.lb-name { font-weight: 500; font-size: 15px; color: var(--black); }
.lb-meta { font-size: 11px; color: var(--mid-gray); margin-top: 3px; }
.lb-num { text-align: right; font-family: 'Roboto Mono', monospace; font-size: 13px; font-variant-numeric: tabular-nums; }
.lb-total { text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
.lb-total-val { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
.chev { color: var(--black); }
.dash { color: var(--line); }

.insights-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
.insights-card { background: var(--white); border: 2px solid var(--black); padding: 24px; }
.bar-chart { margin-top: 8px; }
.bar-row { display: grid; grid-template-columns: 90px 1fr 80px; align-items: center; gap: 12px; padding: 9px 0; font-size: 12px; }
.bar-name { font-family: 'Roboto Mono', monospace; color: var(--dark-gray); font-size: 12px; font-weight: 500; }
.bar-track { height: 24px; background: var(--light-gray); position: relative; overflow: hidden; border: 1px solid var(--line); }
.bar-seg { height: 100%; float: left; transition: width 0.4s ease-out; }
.bar-seg.nnb { background: var(--chart-green); }
.bar-seg.addon { background: var(--chart-yellow); }
.bar-val { text-align: right; font-family: 'Roboto Mono', monospace; font-size: 12px; font-weight: 500; }
.legend { display: flex; gap: 24px; margin-top: 16px; font-size: 11px; color: var(--dark-gray); flex-wrap: wrap; font-weight: 500; }
.legend-dot { width: 12px; height: 12px; display: inline-block; margin-right: 6px; vertical-align: middle; border: 1px solid var(--black); }

.mix-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-size: 12px; }
.mix-bar { height: 12px; background: var(--light-gray); margin: 10px 0 18px 0; display: flex; overflow: hidden; border: 1px solid var(--black); }
.mix-seg { height: 100%; }

.stat-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  background: var(--white); border: 2px solid var(--black); margin-top: 24px;
}
.stat-cell { padding: 22px 20px; }
.stat-cell:not(:first-child) { border-left: 1px solid var(--line); }
.stat-value { font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; color: var(--black); }
.stat-sub { font-size: 11px; color: var(--mid-gray); font-family: 'Roboto Mono', monospace; margin-top: 5px; }

.footer-note { margin-top: 48px; padding-top: 20px; border-top: 2px solid var(--black); font-size: 11px; color: var(--mid-gray); line-height: 1.7; }

.back-btn {
  background: transparent; border: 2px solid var(--black); cursor: pointer;
  font-family: 'Oswald', sans-serif; color: var(--black);
  font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em;
  padding: 8px 16px; margin-bottom: 28px;
  display: inline-flex; align-items: center; gap: 6px;
}
.back-btn:hover { background: var(--black); color: var(--yellow); }

.rep-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  padding-bottom: 28px; border-bottom: 3px solid var(--black);
  margin-bottom: 32px; gap: 24px;
}
.rep-name {
  font-family: 'Oswald', sans-serif;
  font-size: 64px; line-height: 0.95; font-weight: 700; letter-spacing: -0.01em;
  text-transform: uppercase;
}
.rep-total-label { text-align: right; }
.rep-total-val {
  font-family: 'Oswald', sans-serif;
  font-size: 60px; line-height: 0.95; font-weight: 700; letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  background: var(--yellow); color: var(--black);
  padding: 4px 14px 8px 14px; display: inline-block;
}

.insight-flags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
.insight-flag {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; background: var(--white); border: 1px solid var(--black);
  font-size: 12px;
}
.insight-flag-text { color: var(--dark-gray); }

.breakdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
.breakdown-card { background: var(--white); border: 2px solid var(--black); padding: 24px; }
.breakdown-row {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--line); gap: 12px;
}
.breakdown-label { font-size: 13px; }
.breakdown-sub { font-size: 11px; color: var(--mid-gray); margin-top: 3px; }
.breakdown-val { font-family: 'Roboto Mono', monospace; font-size: 13px; font-variant-numeric: tabular-nums; white-space: nowrap; font-weight: 500; }
.breakdown-row.bold { border-bottom: 1px solid var(--black); }
.breakdown-row.bold .breakdown-label { font-weight: 700; }
.breakdown-row.bold .breakdown-val { font-size: 15px; font-weight: 700; }
.breakdown-row.accent { background: var(--yellow-soft); margin: 0 -24px; padding-left: 24px; padding-right: 24px; border-top: 2px solid var(--yellow); border-bottom: 2px solid var(--yellow); }
.breakdown-footer {
  margin-top: 16px; padding-top: 16px; border-top: 3px solid var(--black);
  display: flex; align-items: baseline; justify-content: space-between;
}
.breakdown-footer-label { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.breakdown-footer-val { font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }

.line-items { background: var(--white); border: 2px solid var(--black); }
.li-head, .li-row { display: grid; grid-template-columns: 3fr 1.5fr 1.5fr 1fr 1fr 1.5fr; align-items: center; padding: 12px 20px; gap: 12px; }
.li-head {
  background: var(--black); color: var(--white);
  font-family: 'Oswald', sans-serif;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
}
.li-row { border-bottom: 1px solid var(--line); font-size: 13px; }
.li-row:last-child { border-bottom: none; }
.li-row:hover { background: var(--light-gray); }
.li-customer { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.li-term { font-family: 'Roboto Mono', monospace; font-size: 11px; color: var(--mid-gray); }
.li-num { text-align: right; font-family: 'Roboto Mono', monospace; font-size: 12px; font-variant-numeric: tabular-nums; font-weight: 500; }
.li-neg { color: var(--chart-red); font-weight: 700; }
.li-flat { color: var(--mid-gray); font-style: italic; font-size: 11px; }

@media (max-width: 768px) {
  .container { padding: 32px 16px 16px 16px; }
  .brand-bar { padding: 12px 16px; }
  .upload-headline { font-size: 56px; }
  .page-headline { font-size: 36px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .kpi:nth-child(3), .kpi:nth-child(4) { border-top: 1px solid var(--line); }
  .kpi:nth-child(3) { border-left: none; }
  .insights-grid { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .stat-cell:nth-child(3) { border-left: none; border-top: 1px solid var(--line); }
  .stat-cell:nth-child(4) { border-top: 1px solid var(--line); }
  .breakdown-grid { grid-template-columns: 1fr; }
  .rep-header { flex-direction: column; align-items: flex-start; }
  .rep-total-label { text-align: left; }
  .rep-name { font-size: 40px; }
  .rep-total-val { font-size: 44px; }
  .lb-head, .lb-row { grid-template-columns: 40px 2fr 1.3fr; padding: 12px; font-size: 12px; }
  .lb-head > div:nth-child(n+4), .lb-row > div:nth-child(n+4) { display: none; }
  .lb-total-val { font-size: 18px; }
  .li-head, .li-row { grid-template-columns: 2fr 1fr 1.2fr; padding: 10px 12px; }
  .li-head > div:nth-child(n+4), .li-row > div:nth-child(n+4) { display: none; }
}
</style>

<body>

<div id="app"></div>

<script>
const SETTINGS = { underSubThreeCredit: 0.25, tempMinCount: 3, tempPayoutRate: 0.025, ancillaryThreshold: 125, ancillaryRate: 0.10 };
const PAYOUT_TIERS = [[0,0],[2000,0],[2500,2000],[3000,2225],[3500,2500],[4000,2750],[4500,3000],[5000,4000],[6000,5000],[7000,6000],[8000,7000],[9000,8000],[10000,10000]];
const THREE_PLUS_NEW = ['3 Year - New','4 Year - New','5 Year - New'];
const THREE_PLUS_RENEW = ['3 Year - Retention','4 Year - Retention','5 Year - Retention','3 Year - Renewal','4 Year - Renewal','5 Year - Renewal'];
const ONE_TWO_NEW = ['1 Year - New','2 Year - New'];
const ONE_TWO_RENEW = ['1 Year - Retention','2 Year - Retention','1 Year - Renewal','2 Year - Renewal'];

const CHART_COLORS = {
  green: '#2F7D3A',
  red: '#D93025',
  yellow: '#FFC20E',
  black: '#000000',
  gray: '#999999',
};

function payoutLookup(nnb) { let r=0; for (const [t,p] of PAYOUT_TIERS) { if (nnb>=t) r=p; else break; } return r; }
function num(v) { if (v==null||v==='') return 0; const n = typeof v==='number' ? v : parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; }
function str(v) { return v==null ? '' : String(v).trim(); }
function getField(row, ...names) {
  for (const n of names) {
    if (row[n] !== undefined) return row[n];
    const k = Object.keys(row).find(kk => kk.trim().toLowerCase() === n.trim().toLowerCase());
    if (k) return row[k];
  }
  return undefined;
}

const CRM_REASON_MAP = {
  'New Business - Temp': 'New Temp',
  'New Business - Competition': 'New Perm',
  'New Business - New Site': 'New Perm',
  'New Business - New Owner': 'New Perm',
  'Existing Account - New Location': 'New Perm',
  'Renewal': 'Renewal',
  'Service Increase- Perm': 'Service Increase - Perm',
  'Service Increase - Perm': 'Service Increase - Perm',
  'Price Decrease': 'Price Decrease',
  'Lost Business': 'Lost Business',
};
const CRM_TERM_MAP = { '12 MONTHS':'1 Year', '24 MONTHS':'2 Year', '36 MONTHS':'3 Year', '48 MONTHS':'4 Year', '60 MONTHS':'5 Year' };

function detectFormat(rows) {
  if (rows.length === 0) return 'unknown';
  const cols = Object.keys(rows[0]).map(c => c.trim().toLowerCase());
  const has = (name) => cols.includes(name.toLowerCase());
  if (has('Record Name') && has('Sales Rep Name') && has('Total Base Rate Value')) return 'crm';
  if (has('Customer Name') && has('Sales Rep')) return 'data_import';
  return 'unknown';
}
function normalizeCrmRow(r) {
  const rawReason = str(getField(r, 'Reason Code'));
  const mappedReason = CRM_REASON_MAP[rawReason] || rawReason;
  const rateVal = num(getField(r, 'Total Base Rate Value'));
  const initialTerm = str(getField(r, 'Initial Term')).toUpperCase();
  const yearBase = CRM_TERM_MAP[initialTerm] || null;
  let term = null;
  if (yearBase) {
    if (mappedReason === 'Renewal') term = `${yearBase} - Retention`;
    else if (mappedReason === 'Lost Business') term = `${yearBase} - Lost`;
    else term = `${yearBase} - New`;
  }
  const customer = str(getField(r, 'Record Name')).replace(/^Service Agreement with\s+/i, '');
  return {
    'Customer Name': customer,
    'Sales Rep': str(getField(r, 'Sales Rep Name')),
    'Market Area': str(getField(r, 'Market Area State')),
    'Reason Code': mappedReason,
    'Account #': '',
    'Rate': mappedReason === 'New Temp' ? rateVal : 0,
    'Monthly Revenue': mappedReason === 'New Temp' ? 0 : rateVal,
    'Term': term,
    'Net Difference': 0,
    '# of Temp. Hauls': mappedReason === 'New Temp' ? 1 : 0,
    'Ancillary Charges': 0,
  };
}
function normalizeRows(rows) {
  const format = detectFormat(rows);
  if (format === 'crm') return { format, rows: rows.map(normalizeCrmRow) };
  return { format, rows };
}

function computeCommission(rows, sourceFormat) {
  let rev3New=0, rev3Renew=0, rev12New=0, rev12Renew=0, lost=0, svcIncrease=0;
  let tempHaulsSum=0, tempRateSum=0, tempQualifyingRows=0, tempEconomicRevenue=0;
  let ancillaryPayout=0, ancillaryGross=0;
  let dealsNew=0, dealsRenewal=0, dealsTemp=0, dealsLost=0, dealsOther=0, flatRenewals=0;
  const markets = new Set();

  for (const r of rows) {
    const reason = str(getField(r, 'Reason Code'));
    const term = str(getField(r, 'Term'));
    const monthlyRev = num(getField(r, 'Monthly Revenue'));
    const netDiff = num(getField(r, 'Net Difference'));
    const hauls = num(getField(r, '# of Temp. Hauls', '# of Temp. Hauls '));
    const rate = num(getField(r, 'Rate'));
    const anc = num(getField(r, 'Ancillary Charges'));
    const market = str(getField(r, 'Market Area'));
    if (market) markets.add(market);

    if (THREE_PLUS_NEW.includes(term)) rev3New += monthlyRev;
    if (ONE_TWO_NEW.includes(term)) rev12New += monthlyRev;
    if (reason === 'Renewal' && THREE_PLUS_RENEW.includes(term)) rev3Renew += netDiff;
    if (reason === 'Renewal' && ONE_TWO_RENEW.includes(term)) rev12Renew += netDiff;
    if (reason === 'Renewal' && netDiff === 0) flatRenewals++;
    if (reason === 'Lost Business') lost += monthlyRev;
    if ((reason === 'Svc Increase' || reason === 'Service Increase - Perm') && netDiff > 0) svcIncrease += netDiff;
    if (reason === 'New Temp' && hauls > SETTINGS.tempMinCount) { tempHaulsSum += hauls; tempRateSum += rate; tempQualifyingRows += 1; }
    if (reason === 'New Temp') tempEconomicRevenue += rate * Math.max(hauls, 1);
    if (anc > SETTINGS.ancillaryThreshold) { ancillaryPayout += (anc - SETTINGS.ancillaryThreshold) * SETTINGS.ancillaryRate; ancillaryGross += anc; }
    if (reason === 'New Perm') dealsNew++;
    else if (reason === 'Renewal') dealsRenewal++;
    else if (reason === 'New Temp') dealsTemp++;
    else if (reason === 'Lost Business') dealsLost++;
    else if (reason) dealsOther++;
  }

  const rev3Total = rev3New + rev3Renew;
  const rev12Total = rev12New + rev12Renew;
  const creditedShort = rev12Total * SETTINGS.underSubThreeCredit;
  const rawNNB = rev3Total + creditedShort - lost + svcIncrease;
  const commissionableNNB = Math.max(0, rawNNB);
  const monthlyPayout = payoutLookup(commissionableNNB);
  const tempPayout = sourceFormat === 'crm' ? tempEconomicRevenue * SETTINGS.tempPayoutRate : tempHaulsSum * tempRateSum * SETTINGS.tempPayoutRate;
  const totalAddons = tempPayout + ancillaryPayout;
  const totalVariable = monthlyPayout + totalAddons;

  return {
    rev3New, rev3Renew, rev3Total, rev12New, rev12Renew, rev12Total, creditedShort,
    lost, svcIncrease, rawNNB, commissionableNNB, monthlyPayout,
    tempHaulsSum, tempRateSum, tempQualifyingRows, tempEconomicRevenue, tempPayout,
    ancillaryPayout, ancillaryGross, totalAddons, totalVariable,
    dealsNew, dealsRenewal, dealsTemp, dealsLost, dealsOther, flatRenewals,
    totalDeals: dealsNew + dealsRenewal + dealsTemp + dealsLost + dealsOther,
    markets: Array.from(markets), rowCount: rows.length,
  };
}

  return `

function aggregateRepStats() {
  const grouped = {};
  for (const r of state.rawRows) {
    const rep = str(getField(r, 'Sales Rep'));
    if (!rep) continue;
    (grouped[rep] ||= []).push(r);
  }
  return Object.entries(grouped)
    .map(([name, rows]) => ({ name, rows, ...computeCommission(rows, state.sourceFormat) }))
    .sort((a, b) => b.totalVariable - a.totalVariable);
}
function computeTeamTotals(repStats) {
  if (repStats.length === 0) return null;
  return {
    totalCommission: repStats.reduce((s, r) => s + r.totalVariable, 0),
    totalNNB: repStats.reduce((s, r) => s + r.commissionableNNB, 0),
    totalDeals: repStats.reduce((s, r) => s + r.totalDeals, 0),
    avgCommission: repStats.reduce((s, r) => s + r.totalVariable, 0) / repStats.length,
    topEarner: repStats[0],
    repCount: repStats.length,
  };
}

function attachUploadHandlers() {
  const input = document.getElementById('fileInput');
  const selectBtn = document.getElementById('selectFileBtn');
  const demoBtn = document.getElementById('demoBtn');
  const drop = document.getElementById('dropzone');
  selectBtn.addEventListener('click', () => input.click());
  input.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  demoBtn.addEventListener('click', loadDemo);
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('dragover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
}
function attachDashboardHandlers() {
  document.querySelectorAll('.lb-row').forEach(row => {
    row.addEventListener('click', () => { state.selectedRep = row.dataset.rep; render(); window.scrollTo(0, 0); });
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    state.rawRows = []; state.fileName = ''; state.sourceFormat = 'unknown';
    state.selectedRep = null; state.error = '';
    render();
  });
}
function attachRepHandlers() {
  document.getElementById('backBtn').addEventListener('click', () => { state.selectedRep = null; render(); window.scrollTo(0, 0); });
}

function handleFile(file) {
  state.error = ''; state.fileName = file.name;
  Papa.parse(file, {
    header: true, skipEmptyLines: true, dynamicTyping: false,
    transformHeader: h => h.replace(/^\uFEFF/, '').trim(),
    complete: (results) => {
      const { format, rows: normalized } = normalizeRows(results.data);
      const rows = normalized.filter(r => str(getField(r, 'Sales Rep')));
      if (rows.length === 0) {
        state.error = format === 'unknown'
          ? 'Unrecognized CSV format. Expected either the CRM outside-sales export or the Data_Import layout.'
          : 'No rows with a Sales Rep value were found.';
        render(); return;
      }
      state.rawRows = rows; state.sourceFormat = format; state.selectedRep = null;
      render();
    },
    error: (err) => { state.error = `Parse error: ${err.message}`; render(); },
  });
}
function loadDemo() {
  Papa.parse(DEMO_CSV, {
    header: true, skipEmptyLines: true, dynamicTyping: false,
    complete: (results) => {
      const { format, rows: normalized } = normalizeRows(results.data);
      state.rawRows = normalized.filter(r => str(getField(r, 'Sales Rep')));
      state.fileName = 'Demo data — February (3 reps, CRM format)';
      state.sourceFormat = format; state.selectedRep = null;
      render();
    },
  });
}
